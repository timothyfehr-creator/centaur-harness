name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install "pytest>=8,<10"

      - name: Secret scan
        run: python scripts/secret_scan.py

      - name: Scaffold verification
        run: python scripts/verify.py --mode scaffold

      - name: Tests
        run: pytest
