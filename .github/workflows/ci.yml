name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      PYTHONHASHSEED: "0"   # WP-E1: pin the interpreter hash seed for deterministic engine runs
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Secret scan
        run: python scripts/secret_scan.py

      - name: Schema validation
        run: python scripts/validate_schemas.py

      - name: Source registry validation
        run: python scripts/validate_sources.py

      - name: Claim registry validation
        run: python scripts/validate_claims.py

      - name: Event registry validation
        run: python scripts/validate_events.py

      - name: State validation
        run: python scripts/validate_state.py

      - name: Agent grounding validation
        run: python scripts/validate_agents.py

      - name: Safety check
        run: python scripts/safety_check.py

      - name: Scaffold verification
        run: python scripts/verify.py --mode scaffold

      - name: Draft verification
        run: python scripts/verify.py --mode draft

      - name: Run-ledger / reproducibility (every example)
        run: |
          for l in examples/*/run_ledger.yaml; do
            echo "== $l =="
            python scripts/validate_run_ledger.py "$l" || exit 1
          done

      - name: Review/signoff attestation
        run: python scripts/validate_review_signoff.py

      - name: Review/signoff attestation (salvo het scenario)
        run: python scripts/validate_review_signoff.py --scenario-dir examples/ru_ua_salvo_heterogeneous

      - name: Calibration record
        run: python scripts/validate_calibration.py

      - name: Calibration-feasibility records
        run: python scripts/validate_calibration_feasibility.py

      - name: Engine-state validation
        run: python scripts/validate_engine_state.py

      - name: Ruleset validation
        run: python scripts/validate_ruleset.py

      - name: Turn-replay (engine run-record)
        run: python scripts/validate_turn_replay.py

      - name: Release verification
        run: python scripts/verify.py --mode release

      - name: Tests
        run: pytest
