name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install "pytest>=8,<10"

      - name: Scaffold verification
        run: python scripts/verify.py --mode scaffold

      - name: Tests
        run: pytest
