# Independent-reviewer allow-list (WP-E2c.1).
#
# An attestation whose `attestation_kind: INDEPENDENT` is HONORED by
# scripts/validate_review_signoff.py only if its `reviewer` (review) / `signed_by` (signoff) string
# appears verbatim below. A regex heuristic on the signer name is NOT a security boundary -- a synthetic
# signer that dodges a few flagged words evades it; a positive allow-list is the boundary.
#
# This list is HUMAN-CONTROLLED and ships EMPTY by default: a reviewer is added ONLY by a deliberate human
# act (an autonomous loop must NOT add itself -- a change to this file is conspicuous and merge-reviewed).
# While the list is empty, nothing can be INDEPENDENT and every attestation is a SYNTHETIC_SELF_CHECK. The
# release banner is worst-kind across scenarios, so it reads "INDEPENDENTLY attested" only once EVERY attested
# scenario is signed by an allow-listed reviewer. (Current state: one reviewer is listed below; the
# ru_ua_salvo_heterogeneous scenario is INDEPENDENT, but the repo banner stays "SELF-VERIFIED; NOT
# INDEPENDENTLY ATTESTED" because the ukraine scenario remains a self-check.)
#
# Add an entry ONLY when that reviewer has genuinely, independently reviewed the scenario package, e.g.:
#   independent_reviewers:
#     - "Jane Doe <jane@example.org>"     # external red-team, 2026-06-23
independent_reviewers:
  # WP-E2c.1: a cross-vendor (non-Claude) AI adversarial review of the het scenario package + the
  # remediation. 3-round process: it caught a real release-coverage fail-open the in-house review had
  # MISSED, then a coverage-superset precision gap; both were fixed and the final verdict was APPROVE.
  # Tim Fehr (human) obtained the review and authorized this entry. The string below is the reviewer's
  # verbatim REVIEWER_ID and must match the het review.yaml `reviewer` / signoff.yaml `signed_by`.
  - "OpenAI GPT-5.5 Pro — independent cross-vendor AI adversarial review, 2026-06-24"
