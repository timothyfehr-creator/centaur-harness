upgrade_gap: "two things absent from the sweep, both needed to ever fit p: a genuinely method-independent (impact-site / visual-OSINT / satellite-derived) weekly kinetic-interception estimate for the Sept-Nov 2024 window, AND an observed interceptor-engagement-attempt denominator. Absent both, the channel stays UNCALIBRATED; the only upgrade path is a separate calibration.yaml record justified through validate_calibration.py, never a verdict flip in this feasibility record."
