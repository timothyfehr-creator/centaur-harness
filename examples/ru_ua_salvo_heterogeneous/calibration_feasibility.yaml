verdict: NOT_FEASIBLE
attempted_observable: "p = P(kill | interceptor engagement attempt) for the kinetic drone channel -- the per-engagement-attempt kill probability the model applies to the magazine-constrained interceptor-attempt total sum(fired[t]) at core/salvo_resolver_het.py:258 (it is the rules.yaml p_intercept_pct[drone]). It is NOT a launch-share and NOT a shot-down / launched ratio; the reported UA-AF feed measures the latter, a different quantity."
binding_reasons:
  - "The engagement-attempt DENOMINATOR is itself unobserved: p is a kill rate PER interceptor engagement attempt, but no source reports interceptor engagement attempts (rounds / interceptors committed). The UA-AF feed reports shot-down COUNTS against a launch / inbound denominator -- a different quantity. So even setting the kinetic-vs-EW lumping aside, the model's p has no observed denominator to fit against; mapping shot-down/launched onto p is HYPOTHESIZED, not measured."
  - "Kinetic-vs-jammed split NOT separable in the numerator either: the UA Air Force reports a two-bucket split (shot-down vs 'locationally lost'), and the 'lost' bucket is a 5-reason composite (radar-loss, decoys/imitators, EW, fuel exhaustion, structural defects) per the piterfm data dictionary. Defense Express (quoting the General Staff) states the 'lost' cause was not specified -- whether kinetic or EW is left open. SEPARATELY, ISIS states Ukrainian reporting combines kinetically-destroyed UAVs and UAVs neutralised by EW / other suppression under one 'shot down/suppressed' category. The model's intercepted consumes a KINETIC interceptor, so it cannot be isolated from this lumped reporting."
  - "No method-independent corroboration of the rate: every quantitative source (CSIS, ISIS, the piterfm Kaggle dataset, the ChrisO 'Unmanned Systems Tracker' which self-describes as a piterfm-derived tracker, KAS / Borsari) traces back to the single UA Air Force (kpszsu) daily self-report; ABC News states it cannot independently verify the aerial engagement data. The only method-independent signals are qualitative (the Belarus Hajun incursion counts), not the rate itself."
dossier_ref: "centaur_engine_planning/WP-E2c_DATA_DOSSIER.md (gathered 2026-06-23; multi-source live web sweep + a main-loop CSIS spot-check; verdict STAYS_UNCALIBRATED)"
