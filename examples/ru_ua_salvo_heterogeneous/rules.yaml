# Heterogeneous salvo ruleset (WP-E2b1). EVERY value ASSUMED unless tagged otherwise; UNCALIBRATED.
# Integer-only (canon-safe). The loader flattens this {value, source} tree -> the int-only ruleset the
# engine hashes; the `source` provenance stays here (validate_ruleset.py enforces a tag on every leaf).
schema_version: "1.0"
ruleset_id: ru_ua_salvo_heterogeneous
ruleset_version: "1"
params:
  threats:
    value: [drone, cruise, ballistic]
    source: "ASSUMED — the 3 threat classes (diagonal-first: drone+cruise calibrated, ballistic exogenous)."
  interceptors:
    value: [short, long, pac3]
    source: "ASSUMED — internal interceptor types (magazine-accounting axis; NOT calibrated)."
  p_intercept_pct:                       # CALIBRATED axis (drone, cruise only)
    drone:  {value: 80, source: "ASSUMED — CSIS drone intercept ~75-90% unsaturated; CALIBRATION TARGET (E2c)."}
    cruise: {value: 65, source: "ASSUMED — placeholder; CALIBRATION TARGET (E2c)."}
  per_pairing:                           # interceptors-per-intercept (internal; UNIDENTIFIABLE)
    drone:
      short: {value: 1, source: "ASSUMED — magazine-accounting; STRUCTURALLY-UNIDENTIFIABLE."}
      long:  {value: 1, source: "ASSUMED — STRUCTURALLY-UNIDENTIFIABLE."}
    cruise:
      long:  {value: 1, source: "ASSUMED — STRUCTURALLY-UNIDENTIFIABLE."}
      short: {value: 2, source: "ASSUMED — STRUCTURALLY-UNIDENTIFIABLE."}
    ballistic:
      pac3:  {value: 2, source: "ASSUMED — STRUCTURALLY-UNIDENTIFIABLE."}
  allocation_priority:                   # the named rule input: best-vs-threat interceptor first
    drone:     {value: [short, long], source: "ASSUMED — doctrine placeholder."}
    cruise:    {value: [long, short], source: "ASSUMED — doctrine placeholder."}
    ballistic: {value: [pac3],        source: "ASSUMED — only PAC-3 engages ballistic."}
  threat_order:
    value: [ballistic, cruise, drone]
    source: "ASSUMED — scarce-interceptor priority; VERSIONED in fixed-priority-best-first-v1."
  weekly_engagement_capacity:
    drone:     {value: 100000, source: "ASSUMED — high default; CSIS '>150/day' anchors the realistic band."}
    cruise:    {value: 100000, source: "ASSUMED."}
    ballistic: {value: 100000, source: "ASSUMED."}
  saturation_threshold:
    drone:     {value: 1050, source: "EXPLORATORY — CSIS '>150/day' ~ 1050/week; anchor, not a fit."}
    cruise:    {value: 1050, source: "EXPLORATORY."}
    ballistic: {value: 1050, source: "EXPLORATORY."}
  saturation_retained_pct:
    drone:     {value: 70, source: "EXPLORATORY — degradation above threshold."}
    cruise:    {value: 70, source: "EXPLORATORY."}
    ballistic: {value: 70, source: "EXPLORATORY."}
  ballistic_leak_floor_pct:
    value: 60
    source: "ASSUMED — dossier-illustrative (WP-E2c_DATA_DOSSIER: RUSI/FT ballistic intercept ~6-37%, i.e. leak ~63-94%). 60% leak = best-case ~40% intercept (competent, well-supplied IADS). The band is set to the OPERATIONAL portion above the ballistic culmination floor so the floor detects COLLAPSE/degradation (driven endogenously by magazine starvation), not ballistics' inherent marginality; worse dossier outcomes (6-20% intercept) are reproduced via depletion, not nominal p. Corrects the prior backwards 20-35% leak (= 65-80% intercept). NOT a calibrated cell."
  ballistic_leak_high_pct:
    value: 80
    source: "ASSUMED — dossier-illustrative; 80% leak = worst-case ~20% intercept. The band low<=central<=high propagates (holding magazine-constrained attempts fixed) into the reported effective-rate band + a culmination-verdict indeterminacy flag — no longer decorative."
  lethality_floor_pct:                     # per-class floors -> WEAKEST-LINK culmination (any class below its floor k wk)
    drone:     {value: 50, source: "ASSUMED, LOCKED by the user 2026-06-23 on doctrinal grounds (sustained sub-50% effective DRONE interception = the defense can no longer sustain protection; Clausewitz culmination). NOT backtest-calibratable (the Sept-Nov 2024 window has no culmination event); locked BEFORE E2c (no post-hoc tuning)."}
    cruise:    {value: 40, source: "ASSUMED — contract EXTENSION (user-confirmed, Option A 2026-06-23). Below the drone floor (cruise interception is harder than drone). Load-bearing: decides cruise-class culmination. Locked before E2c, no post-hoc tuning. NOT calibrated."}
    ballistic: {value: 25, source: "ASSUMED — contract EXTENSION (user-confirmed, Option A 2026-06-23). Set BELOW ballistic's ~30% central nominal intercept (the corrected leak band) so the floor detects COLLAPSE/degradation (e.g. PAC-3 starvation), NOT ballistics' inherent marginality. Load-bearing; locked before E2c. NOT calibrated."}
  culmination_k_weeks:
    value: 3
    source: "ASSUMED, LOCKED by the user 2026-06-23: collapse requires the effective rate below the floor for 3 consecutive weeks (filters transient saturation spikes); applies PER CLASS (weakest-link). NOT backtest-calibratable; locked before E2c. Drives the committed campaign's culmination week."
