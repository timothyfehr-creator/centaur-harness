schema_version: "1.0"
title: "Ukraine / Crimea logistics posture, end-2026"
label: ILLUSTRATIVE          # NOT a real-world claim; unsourced placeholder (Constitution 4-5)
as_of_date: "2026-06-17"
description: >
  ILLUSTRATIVE scenario used only to exercise the schema gate. Probabilities and
  indicators are placeholders, not analytic estimates, and are NOT source-backed.
  Sourcing/labeling enforcement arrives in later work packages (WP2.3 / WP3.2).

branches:
  - id: escalation
    title: "Sustained logistics escalation"
    probability: 0.35
    signposts:
      - "Rail throughput to the front increases quarter over quarter"
      - "New forward supply depots observed near the land corridor"
      - "Munitions expenditure rate rises above the prior-quarter baseline"
    falsifiers:
      - "A verified, binding ceasefire halts resupply operations"
    rationale: >
      Placeholder rationale: 0.35 reflects a plausible-but-not-dominant continuation
      of the current logistics build-up. Not source-backed; ILLUSTRATIVE only.

  - id: stalemate
    title: "Frozen logistics stalemate"
    probability: 0.45
    signposts:
      - "Rail and road throughput hold near current levels"
      - "No new major depot construction is observed"
      - "Munitions expenditure stays within the prior-quarter band"
    falsifiers:
      - "Either a major offensive surge or a verified ceasefire is observed"
    rationale: >
      Placeholder rationale: 0.45 is the modal placeholder outcome. Not source-backed;
      ILLUSTRATIVE only.

  - id: degradation
    title: "Logistics degradation"
    probability: 0.20
    signposts:
      - "Throughput to the front declines for two consecutive months"
      - "Depot activity contracts or relocates rearward"
      - "Munitions expenditure falls below the prior-quarter baseline"
    falsifiers:
      - "Throughput recovers to or above the prior-quarter baseline"
    rationale: >
      Placeholder rationale: 0.20 is the lower-likelihood placeholder. Not
      source-backed; ILLUSTRATIVE only.
