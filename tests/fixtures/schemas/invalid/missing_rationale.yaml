# Defect: branch a has neither rationale nor update_mechanism  ->  missing-rationale-or-update
schema_version: "1.0"
branches:
  - id: a
    probability: 0.5
    signposts: ["A1", "A2", "A3"]
    falsifiers: ["F1"]
  - id: b
    probability: 0.5
    signposts: ["B1", "B2", "B3"]
    falsifiers: ["F1"]
    rationale: "r"
