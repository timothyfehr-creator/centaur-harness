# Defect: branch a has only 2 signposts  ->  too-few-signposts
schema_version: "1.0"
branches:
  - id: a
    probability: 0.5
    signposts: ["A1", "A2"]
    falsifiers: ["F1"]
    rationale: "r"
  - id: b
    probability: 0.5
    signposts: ["B1", "B2", "B3"]
    falsifiers: ["F1"]
    rationale: "r"
